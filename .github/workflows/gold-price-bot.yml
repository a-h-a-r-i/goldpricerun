name: Gold Price Bot

on:
  schedule:
    - cron: '30 4,11 * * *'
  workflow_dispatch:

jobs:
  send-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send gold price update
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          RUN_ONCE: 'true'
        run: node index.js
